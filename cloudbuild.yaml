steps:
  # 1. Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
    dir: 'backend'
    id: 'Install'

  # 2. Run Tests
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['test']
    dir: 'backend'
    id: 'Test'

  # 3. Build Docker container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/electiq-backend', '.']
    id: 'Build'

  # 4. Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/electiq-backend']
    id: 'Push'

  # 5. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'electiq-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/electiq-backend'
      - '--region'
      - 'asia-south1'
      - '--allow-unauthenticated'
      - '--session-affinity'
    id: 'Deploy'

images:
  - 'gcr.io/$PROJECT_ID/electiq-backend'

options:
  logging: CLOUD_LOGGING_ONLY
