<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1">
  <meta name="description" content="ElectIQ — AI-powered election companion that personalises your voting journey with Gemini AI, step-by-step timelines, document checklists, and civic quizzes.">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ElectIQ — Your Personal Election Companion</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="live-announce" aria-live="polite" aria-atomic="true" class="sr-only"></div>

<!-- SPLASH -->
<div id="splash" class="splash">
  <div class="splash-ring"></div>
  <div class="splash-logo">Elect<span>IQ</span></div>
  <div class="splash-tagline">AI-Powered Election Companion</div>
  <div class="splash-loader"><div class="splash-loader-bar"></div></div>
</div>

<div id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="brand-text">Elect<span>IQ</span></div>
    </div>

    <nav class="sidebar-nav" role="tablist" aria-label="Main navigation">
      <button class="nav-item active" role="tab" aria-selected="true" aria-controls="view-home" id="tab-home" data-tab="home" onclick="switchTab('home')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" role="tab" aria-selected="false" aria-controls="view-journey" id="tab-journey" data-tab="journey" onclick="switchTab('journey')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Journey</span>
      </button>
      <button class="nav-item" role="tab" aria-selected="false" aria-controls="view-chat" id="tab-chat" data-tab="chat" onclick="switchTab('chat')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Ask AI</span>
        <span class="nav-badge">Gemini</span>
      </button>
      <button class="nav-item" role="tab" aria-selected="false" aria-controls="view-checklist" id="tab-checklist" data-tab="checklist" onclick="switchTab('checklist')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Checklist</span>
      </button>
      <button class="nav-item" role="tab" aria-selected="false" aria-controls="view-quiz" id="tab-quiz" data-tab="quiz" onclick="switchTab('quiz')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span>Quiz</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-profile" id="sidebar-profile">
        <div class="profile-avatar" id="profile-avatar">?</div>
        <div class="profile-info">
          <div class="profile-state" id="sidebar-state">Setup required</div>
          <div class="profile-type" id="sidebar-type">—</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MOBILE TOP BAR -->
  <header class="mobile-header" id="mobile-header">
    <button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="mobile-brand">Elect<span>IQ</span></div>
    <div class="mobile-badge" id="mobile-badge">Setup</div>
  </header>

  <!-- MAIN CONTENT AREA -->
  <main class="main-content" id="main-content">
    <!-- TOP BAR -->
    <div class="topbar" id="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title" id="topbar-title">Dashboard</h1>
        <div class="topbar-breadcrumb" id="topbar-breadcrumb">Home</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-time" id="topbar-time"></div>
        <button class="topbar-btn" onclick="resetProfile()" title="Reset profile">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>

    <!-- PANELS -->
    <div class="panels-container">
      <!-- HOME / DASHBOARD -->
      <section class="panel active" role="tabpanel" id="view-home" aria-labelledby="tab-home" tabindex="0"></section>
      <!-- JOURNEY -->
      <section class="panel" role="tabpanel" id="view-journey" aria-labelledby="tab-journey" tabindex="0"></section>
      <!-- CHAT -->
      <section class="panel panel-chat" role="tabpanel" id="view-chat" aria-labelledby="tab-chat" tabindex="0">
        <div class="chat-messages" id="chat-messages">
          <div class="chat-welcome-card">
            <div class="chat-welcome-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <h2 class="chat-welcome-title">Ask ElectIQ Anything</h2>
            <p class="chat-welcome-text">Powered by <strong>Google Gemini</strong> — your AI election guide for voter registration, documents, polling, and rights.</p>
          </div>
        </div>
        <div class="chat-chips" id="quick-chips">
          <button class="chip" onclick="sendQuick('What ID do I need to vote?')">🪪 What ID do I need?</button>
          <button class="chip" onclick="sendQuick('How do I find my polling booth?')">📍 Find my booth</button>
          <button class="chip" onclick="sendQuick('When is the registration deadline?')">⏰ Deadlines</button>
          <button class="chip" onclick="sendQuick('How does the EVM machine work?')">🗳️ How EVM works</button>
          <button class="chip" onclick="sendQuick('What is VVPAT and why does it matter?')">📜 What is VVPAT?</button>
        </div>
        <div class="chat-composer-wrapper">
          <div id="image-preview-container" class="image-preview-container" style="display: none;">
            <img id="image-preview" src="" alt="Selected image">
            <button class="remove-image-btn" onclick="removeImage()" aria-label="Remove image">×</button>
          </div>
          <div class="chat-composer">
            <button class="composer-btn mic-btn" id="voice-btn" aria-label="Hold to speak" onpointerdown="startVoice()" onpointerup="stopVoice()" onpointercancel="stopVoice()" onpointerleave="stopVoice()" style="touch-action:none">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <input type="file" id="image-upload" accept="image/*" class="sr-only" onchange="handleImageSelect(event)">
            <label for="image-upload" class="composer-btn camera-btn" aria-label="Upload image" title="Upload image (e.g. ID card)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </label>
            <textarea class="composer-input" id="chat-input" aria-label="Message input" placeholder="Ask about elections, voting, documents..." rows="1"></textarea>
            <button class="composer-btn send-btn" id="send-btn" aria-label="Send message" onclick="handleSend()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </section>
      <!-- CHECKLIST -->
      <section class="panel" role="tabpanel" id="view-checklist" aria-labelledby="tab-checklist" tabindex="0"></section>
      <!-- QUIZ -->
      <section class="panel" role="tabpanel" id="view-quiz" aria-labelledby="tab-quiz" tabindex="0"></section>
    </div>
  </main>
</div>

<!-- MOBILE OVERLAY -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- LEAFLET MAPS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script src="/app.js"></script>
</body>
</html>
